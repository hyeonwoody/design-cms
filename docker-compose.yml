version: "3.7"

services:
  db:
    image: postgres:16-alpine
    container_name: design_cms
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: design_cms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d design_cms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
